<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml"><link rel="icon" href="logo.png" type="image/png" sizes="any"><link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#000000">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>404 — 777heaven Records</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .error-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 30px 80px;
            text-align: center;
            position: relative;
        }

        .error-page::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.025) 0%, transparent 65%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .error-label {
            font-size: 9px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.38);
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
        }

        .error-code {
            font-size: clamp(96px, 18vw, 180px);
            font-weight: 700;
            letter-spacing: -8px;
            line-height: 0.88;
            color: rgba(255,255,255,0.06);
            position: relative;
            z-index: 1;
            margin-bottom: 32px;
            animation: fadeUp 0.55s ease 0.05s forwards;
            opacity: 0;
        }

        .error-msg {
            font-size: clamp(22px, 4vw, 34px);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.55s ease 0.1s forwards;
            opacity: 0;
        }

        .error-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.55);
            max-width: 380px;
            line-height: 1.75;
            margin-bottom: 48px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.55s ease 0.15s forwards;
            opacity: 0;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 36px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            transition: all 0.3s;
            min-height: 48px;
            touch-action: manipulation;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.55s ease 0.2s forwards;
            opacity: 0;
        }

        .home-btn:hover {
            background: rgba(255,255,255,0.88);
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(255,255,255,0.2);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .error-page { padding: 100px 20px 60px; }
            .error-code { letter-spacing: -4px; }
            .home-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <main class="error-page">
        <p class="error-label">Error</p>
        <div class="error-code">404</div>
        <h1 class="error-msg">Page not found.</h1>
        <p class="error-sub">This page doesn't exist or was moved. Head back to the homepage.</p>
        <a href="index.html" class="home-btn">Back to Home</a>
    </main>

    <div id="footer-placeholder"></div>
    <script src="components.js"></script>
</body>
</html>
