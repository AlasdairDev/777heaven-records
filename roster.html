<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml"><link rel="icon" href="logo.png" type="image/png" sizes="any"><link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#000000">
    <title>Roster — 777heaven Records</title>
    <meta name="description" content="The 777Heaven Records roster — 18 independent underground artists from Manila and beyond.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .roster-page {
            min-height: 100vh;
            padding: 140px 40px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .roster-eyebrow {
            font-size: 9px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 40px;
        }

        .heaven-records-roster {
            max-width: 980px;
            text-align: center;
            line-height: 2.1;
        }

        .artist-entry {
            font-size: clamp(19px, 2.8vw, 30px);
            font-weight: 600;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: opacity 0.2s ease;
            display: inline;
        }

        .roster-sep {
            color: rgba(255,255,255,0.30);
            font-weight: 300;
            transition: opacity 0.2s ease;
            user-select: none;
            display: inline;
        }

        @media (min-width: 969px) {
            .heaven-records-roster:hover .artist-entry,
            .heaven-records-roster:hover .roster-sep {
                opacity: 0.14;
            }
            .heaven-records-roster .artist-entry:hover {
                opacity: 1 !important;
            }
        }

        .roster-count {
            margin-top: 52px;
            font-size: 9px;
            letter-spacing: 5px;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
        }

        @media (max-width: 968px) {
            .roster-page { padding: 120px 28px 64px; }
            .heaven-records-roster { line-height: 2.0; }
        }

        @media (max-width: 600px) {
            .roster-page { padding: 104px 20px 52px; }
            .heaven-records-roster { line-height: 1.95; }
        }

        @media (max-width: 400px) {
            .roster-page { padding: 88px 16px 44px; }
            .heaven-records-roster { line-height: 1.9; }
        }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <main class="roster-page">

        <p class="roster-eyebrow">Current Roster</p>

        <section class="heaven-records-roster">
            <span class="artist-entry">6TREET</span><span class="roster-sep"> · </span><span class="artist-entry">AGONY AND ECSTASY</span><span class="roster-sep"> · </span><span class="artist-entry">ANYU</span><span class="roster-sep"> · </span><span class="artist-entry">AREN'T WE ORDINARY?</span><span class="roster-sep"> · </span><span class="artist-entry">ATARI2K</span><span class="roster-sep"> · </span><span class="artist-entry">BENSPLAYSSUUU</span><span class="roster-sep"> · </span><span class="artist-entry">CHEST.IN</span><span class="roster-sep"> · </span><span class="artist-entry">DECENT</span><span class="roster-sep"> · </span><span class="artist-entry">FORSYTHIÁ</span><span class="roster-sep"> · </span><span class="artist-entry">HOLDING RIVERS</span><span class="roster-sep"> · </span><span class="artist-entry">JAZTER</span><span class="roster-sep"> · </span><span class="artist-entry">JUCU</span><span class="roster-sep"> · </span><span class="artist-entry">KAYLE</span><span class="roster-sep"> · </span><span class="artist-entry">MOXY!</span><span class="roster-sep"> · </span><span class="artist-entry">OCRAM ARGEINAT</span><span class="roster-sep"> · </span><span class="artist-entry">SAMSKARA</span><span class="roster-sep"> · </span><span class="artist-entry">STRAWBERRY SWEETS</span><span class="roster-sep"> · </span><span class="artist-entry">YUVAL AGUAVIVA</span>
        </section>

        <p class="roster-count">18 Artists · 777Heaven Records</p>

    </main>

    <div id="footer-placeholder"></div>
    <script src="components.js"></script>
</body>
</html>
